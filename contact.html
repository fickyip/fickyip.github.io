<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <!-- Light mode favicon -->
    <link rel="icon" href="img/favicon-light.svg" type="image/x-icon" media="(prefers-color-scheme: light)">
    <!-- Dark mode favicon -->
    <link rel="icon" href="img/favicon-dark.svg" type="image/x-icon" media="(prefers-color-scheme: dark)">
    <title>Contact | Fredrick Yip</title>
    <style>
        .contact-container {
            display: flex;
            flex-direction: column;
            min-height: 80vh;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        
        .contact-content {
            max-width: 802px;
            width: 100%;
        }
        
        .contact-content h1 {
            font-size: 48px;
            font-weight: 500;
            letter-spacing: -1.5px;
            margin-bottom: 20px;
        }
        
        .contact-content p {
            font-size: 18px;
            line-height: 1.6;
            color: #666;
            margin-bottom: 40px;
        }
        
        .contact-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
        }
        
        .form-group {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .form-group label {
            text-align: left;
            font-size: 14px;
            font-weight: 500;
        }
        
        .form-group input,
        .form-group textarea {
            padding: 12px 16px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        
        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #1d1d1d;
        }
        
        .form-group textarea {
            resize: vertical;
            min-height: 120px;
        }
        
        .submit-btn {
            padding: 12px 40px;
            background: #1d1d1d;
            color: white;
            border: none;
            border-radius: 4px;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }
        
        .submit-btn:hover {
            background: #000;
            transform: scale(1.05);
        }
        
        @media (max-width: 768px) {
            .contact-container {
                padding: 100px 34px;
                min-height: auto;
            }
            
            .contact-content h1 {
                font-size: 32px;
            }
            
            .contact-content p {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <!-- Header/Navigation -->
    <header>
        <div class="header-content">
            <a href="index.html" class="logo">Fredrick Yip</a>
            <button class="menuIcon" id="menuIcon">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </button>
        </div>
        <nav class="nav" id="nav">
            <ul class="navList">
                <li class="navItem">
                    <a href="works.html" class="navLink">Works</a>
                </li>
                <li class="navItem">
                    <a href="about.html" class="navLink">About</a>
                </li>
                <li class="navItem">
                    <a href="contact.html" class="navLink">Contact</a>
                </li>
            </ul>
        </nav>
    </header>

    <!-- Contact Section -->
    <section class="contact-container">
        <div class="contact-content">
            <h1>Get In Touch</h1>
            <p>Have a project in mind? Let's collaborate and create something amazing together.</p>
            <form class="contact-form">
                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" required>
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="subject">Subject</label>
                    <input type="text" id="subject" name="subject" required>
                </div>
                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" required></textarea>
                </div>
                <button type="submit" class="submit-btn" onclick="sendEmail()">Send Message</button>
            </form>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <div class="container">
            <p>&copy; 2026 Fredrick Yip. All rights reserved.</p>
        </div>
    </footer>
    <script src="scripts.js"></script>
</body>
</html>

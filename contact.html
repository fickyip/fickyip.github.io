<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <!-- Light mode favicon -->
    <link rel="icon" href="img/favicon/favicon-light.svg" type="image/x-icon" media="(prefers-color-scheme: light)">
    <!-- Dark mode favicon -->
    <link rel="icon" href="img/favicon/favicon-dark.svg" type="image/x-icon" media="(prefers-color-scheme: dark)">
    <title>Contact | Fredrick Yip</title>
</head>

<body>
    <!-- Header/Navigation -->
    <header>
        <div class="header-content">
            <a href="index.html" class="desktop-logo">Fredrick Yip</a>
            <a href="index.html" class="mobile-logo">F.</a>
            <button class="menuIcon" id="menuIcon">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </button>
        </div>
        <nav class="nav" id="nav">
            <ul class="navList">
                <li class="navItem">
                    <a href="works.html" class="navLink">Works</a>
                </li>
                <li class="navItem">
                    <a href="about.html" class="navLink">About</a>
                </li>
                <li class="navItem">
                    <a href="contact.html" class="navLink active">Contact</a>
                </li>
            </ul>
        </nav>
    </header>

    <!-- Contact Section -->
    <section class="contact-container">
        <div class="contact-content">
            <h1>Get In Touch</h1>
            <p>Have a project in mind? Let's collaborate and create something amazing together.</p>
            <form class="contact-form" id="contactForm" action="https://api.web3forms.com/submit" method="POST">
                <input type="hidden" name="access_key" value="b5cf81d6-54b7-4fc4-96a2-60a83494bf74">

                <!-- Form Inputs -->
                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" required>
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" maxlength="500" required></textarea>
                </div>

                <!-- Honeypot Spam Protection -->
                <input type="checkbox" name="botcheck" class="hidden" style="display: none;">

                <button type="submit" class="submit-btn">Submit Form</button>
            </form>
            <p id="formStatus" role="status" aria-live="polite"></p>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <div>
            <p>&copy; 2026 Fredrick Yip. All rights reserved.</p>
        </div>
    </footer>
    <script src="scripts.js"></script>
</body>

</html>
